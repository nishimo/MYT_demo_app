<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シーシャ×経営 総合ポテンシャル診断</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light: #ecf0f1;
            --dark: #1a252f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ヘッダー */
        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #95a5a6;
            font-size: 0.9rem;
        }

        /* スタート画面 */
        .start-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .quiz-type-selector {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }

        .quiz-type-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .quiz-type-btn:hover {
            background: rgba(52, 152, 219, 0.3);
            border-color: var(--secondary);
        }

        .quiz-type-btn h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .quiz-type-btn p {
            font-size: 0.85rem;
            color: #95a5a6;
        }

        .quiz-type-btn .badge {
            display: inline-block;
            background: var(--secondary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        /* クイズ画面 */
        .quiz-screen {
            display: none;
        }

        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--secondary), var(--success));
            height: 100%;
            transition: width 0.3s;
        }

        .question-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #95a5a6;
        }

        .category-badge {
            background: rgba(52, 152, 219, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .question-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.15rem;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        .answer-buttons {
            display: flex;
            gap: 15px;
        }

        .answer-btn {
            flex: 1;
            padding: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .answer-btn:hover {
            transform: translateY(-2px);
        }

        .answer-btn.correct-btn:hover {
            background: rgba(39, 174, 96, 0.3);
            border-color: var(--success);
        }

        .answer-btn.wrong-btn:hover {
            background: rgba(231, 76, 60, 0.3);
            border-color: var(--danger);
        }

        .answer-btn.selected-correct {
            background: rgba(39, 174, 96, 0.5);
            border-color: var(--success);
        }

        .answer-btn.selected-wrong {
            background: rgba(231, 76, 60, 0.5);
            border-color: var(--danger);
        }

        .answer-btn.show-correct {
            background: rgba(39, 174, 96, 0.3);
            border-color: var(--success);
        }

        .answer-btn.selected {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }

        .answer-btn.correct-btn.selected {
            background: rgba(39, 174, 96, 0.4);
            border-color: var(--success);
        }

        .answer-btn.wrong-btn.selected {
            background: rgba(231, 76, 60, 0.4);
            border-color: var(--danger);
        }

        .answer-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* フィードバック */
        .feedback {
            display: none;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .feedback.correct {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid var(--success);
        }

        .feedback.wrong {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--danger);
        }

        .feedback.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid var(--secondary);
        }

        .feedback h4 {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feedback p {
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        .next-btn {
            width: 100%;
            padding: 16px;
            background: var(--secondary);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }

        .next-btn:hover {
            background: #2980b9;
        }

        /* 結果画面 */
        .result-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .score-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: conic-gradient(var(--success) var(--score-percent), rgba(255,255,255,0.1) 0);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px auto;
            position: relative;
        }

        .score-circle::before {
            content: '';
            width: 140px;
            height: 140px;
            background: var(--dark);
            border-radius: 50%;
            position: absolute;
        }

        .score-text {
            position: relative;
            z-index: 1;
        }

        .score-text .score {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .score-text .total {
            font-size: 1rem;
            color: #95a5a6;
        }

        .grade {
            font-size: 3rem;
            margin: 20px 0;
        }

        .grade-label {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .main-scores {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }

        .main-score-card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .main-score-card h3 {
            font-size: 0.9rem;
            color: #95a5a6;
            margin-bottom: 10px;
        }

        .main-score-value {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .main-score-percent {
            font-size: 1rem;
            color: #95a5a6;
            margin-bottom: 10px;
        }

        .main-score-grade {
            font-size: 2rem;
            font-weight: bold;
        }

        .main-score-grade.grade-a { color: var(--success); }
        .main-score-grade.grade-b { color: var(--secondary); }
        .main-score-grade.grade-c { color: var(--warning); }
        .main-score-grade.grade-d { color: var(--danger); }

        .category-scores {
            text-align: left;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
        }

        .category-scores h3 {
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .category-score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .category-score-item:last-child {
            border-bottom: none;
        }

        .category-score-item .name {
            font-size: 0.9rem;
        }

        .category-score-item .score {
            font-weight: bold;
        }

        .restart-btn {
            padding: 16px 40px;
            background: var(--secondary);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: #2980b9;
        }

        /* 自己評価モード用 */
        .self-eval-note {
            background: rgba(243, 156, 18, 0.2);
            border: 1px solid var(--warning);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        /* 説明入力用 */
        .explanation-input {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid var(--secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .explanation-input label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.95rem;
            color: #ecf0f1;
        }

        .explanation-input textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }

        .explanation-input textarea::placeholder {
            color: #7f8c8d;
        }

        .explanation-input textarea:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .user-explanation-display {
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid var(--secondary);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .user-explanation-display h5 {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-bottom: 8px;
        }

        .user-explanation-display p {
            font-size: 0.9rem;
            color: #ecf0f1;
            white-space: pre-wrap;
        }

        /* レスポンシブ */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.4rem;
            }

            .question-text {
                font-size: 1rem;
            }

            .answer-buttons {
                flex-direction: column;
            }

            .score-circle {
                width: 150px;
                height: 150px;
            }

            .score-circle::before {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <div class="header">
            <h1>シーシャ×経営<br>総合ポテンシャル診断</h1>
            <p>MYTコーチング</p>
        </div>

        <!-- スタート画面 -->
        <div class="start-screen" id="startScreen">
            <p>診断したいカテゴリを選んでください</p>

            <div class="quiz-type-selector">
                <button class="quiz-type-btn" onclick="startQuiz('all')">
                    <h3>総合ポテンシャル診断 <span class="badge">55問</span></h3>
                    <p>シーシャ技術（30問）＋ 経営知識（25問）</p>
                </button>
            </div>
        </div>

        <!-- クイズ画面 -->
        <div class="quiz-screen" id="quizScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-info">
                <span id="questionNumber">問1 / 30</span>
                <span class="category-badge" id="categoryBadge">カテゴリ</span>
            </div>

            <div id="selfEvalNote" class="self-eval-note" style="display: none;">
                自己評価形式：できる/説明できる → ○、できない → ×
            </div>

            <div class="question-card">
                <p class="question-text" id="questionText">問題文がここに表示されます</p>

                <div class="answer-buttons">
                    <button class="answer-btn correct-btn" id="btnCorrect" onclick="answer(true)">○</button>
                    <button class="answer-btn wrong-btn" id="btnWrong" onclick="answer(false)">×</button>
                </div>
            </div>

            <div class="feedback" id="feedback">
                <h4 id="feedbackTitle">正解！</h4>
                <p id="feedbackText">解説がここに表示されます</p>
            </div>

            <div class="explanation-input" id="explanationInput" style="display: none;">
                <label for="userExplanation" id="explanationLabel">あなたの説明を入力してください：</label>
                <textarea id="userExplanation" rows="4" placeholder="自分の言葉で説明してください..."></textarea>
            </div>

            <div class="user-explanation-display" id="userExplanationDisplay" style="display: none;">
                <h5>あなたの説明：</h5>
                <p id="userExplanationText"></p>
            </div>

            <button class="next-btn" id="confirmBtn" onclick="confirmAnswer()">回答を確定</button>
            <button class="next-btn" id="submitExplanationBtn" onclick="submitExplanation()" style="display: none;">説明を送信して次へ</button>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ</button>
        </div>

        <!-- 結果画面 -->
        <div class="result-screen" id="resultScreen">
            <h2>診断結果</h2>

            <div class="score-circle" id="scoreCircle">
                <div class="score-text">
                    <div class="score" id="finalScore">0</div>
                    <div class="total" id="finalTotal">/ 0問</div>
                </div>
            </div>

            <div class="grade" id="grade">A</div>
            <div class="grade-label" id="gradeLabel">トップクラス</div>

            <div class="main-scores">
                <div class="main-score-card" id="shishaScoreCard">
                    <h3>シーシャ技術</h3>
                    <div class="main-score-value" id="shishaScore">0/30</div>
                    <div class="main-score-percent" id="shishaPercent">0%</div>
                    <div class="main-score-grade" id="shishaGrade">-</div>
                </div>
                <div class="main-score-card" id="businessScoreCard">
                    <h3>経営知識</h3>
                    <div class="main-score-value" id="businessScore">0/25</div>
                    <div class="main-score-percent" id="businessPercent">0%</div>
                    <div class="main-score-grade" id="businessGrade">-</div>
                </div>
            </div>

            <div class="category-scores" id="categoryScores">
                <h3>詳細カテゴリ別スコア</h3>
                <div id="categoryScoreList"></div>
            </div>

            <button class="restart-btn" onclick="restart()">もう一度診断する</button>
        </div>
    </div>

    <script>
        // シーシャ技術診断（30問）
        const shishaQuestions = [
            // Ⅰ．最重要：シーシャの土台理解（1〜8）
            {
                category: "Ⅰ. シーシャの土台理解",
                question: "シーシャで、フレーバーを過熱するのでなく、熱で温めて成分を抽出している意図を自分の言葉で説明できる",
                type: "self-eval",
                explanation: "シーシャは「燃やす」のではなく「揮発させる」ことで味を引き出します。過熱を避け、最適な温度帯を維持する理解が重要です。"
            },
            {
                category: "Ⅰ. シーシャの土台理解",
                question: "シーシャを作ってから30分後に、何が変わるか3つ以上言える",
                type: "self-eval",
                explanation: "熱のなじみ、フレーバーの味変化、キック感の減少、炭の灰化、温度の浸透など、時間経過による変化を理解することが重要です。"
            },
            {
                category: "Ⅰ. シーシャの土台理解",
                question: "香り・味・煙のうち、最初に出やすいものと遅れて出るものを区別できる",
                type: "self-eval",
                explanation: "香料→糖蜜→グリセリンの順で活性化します。それぞれの揮発タイミングを理解することで、より良い提供ができます。"
            },
            {
                category: "Ⅰ. シーシャの土台理解",
                question: "同じフレーバーで、結果が変わった具体例を1つ説明できる",
                type: "self-eval",
                explanation: "機材の変化や外的要因（気温など）で結果は変わります。再現性を持たせるには、変数を意識することが必要です。"
            },
            {
                category: "Ⅰ. シーシャの土台理解",
                question: "炭の「数」以外に、重要な要素を2つ以上言える",
                type: "self-eval",
                explanation: "炭の体積、炭の炊き方、熱気と外気のバランス、使う道具との相性など、数以外にも多くの要素があります。"
            },
            {
                category: "Ⅰ. シーシャの土台理解",
                question: "強く吸いすぎたときに、実際に起きた変化を説明できる",
                type: "self-eval",
                explanation: "強く吸うと熱中心の侵入が進み、上面と下面の剥離が発生。本来持つ時間が短縮される原因になります。"
            },
            {
                category: "Ⅰ. シーシャの土台理解",
                question: "吸う人が変わったときに、どこが変わるか具体的に言える",
                type: "self-eval",
                explanation: "吸い方には属人性があり、浅く吸う人と深く吸う人では、熱の入り方や味の出方が大きく変わります。"
            },
            {
                category: "Ⅰ. シーシャの土台理解",
                question: "その場に合わせて、作り方を変えた経験を説明できる",
                type: "self-eval",
                explanation: "お客さまの好みや趣向に合わせてカスタマイズすることで、より高い満足度を提供できます。"
            },
            // Ⅱ．熱と炭の扱い（9〜15）
            {
                category: "Ⅱ. 熱と炭の扱い",
                question: "炭の数を変えた理由を、結果とセットで説明できる",
                type: "self-eval",
                explanation: "炭が多いと熱中心の侵入で上面が活性化、少ないと外気優位で活性化温度に到達しないなど、結果が大きく変わります。"
            },
            {
                category: "Ⅱ. 熱と炭の扱い",
                question: "炭を中央寄り／外側寄りに置く理由を説明できる",
                type: "self-eval",
                explanation: "炭の配置は熱の入り方を左右します。中央は強い熱、外側は緩やかな熱になります。"
            },
            {
                category: "Ⅱ. 熱と炭の扱い",
                question: "炭を動かさずに失敗した経験を説明できる",
                type: "self-eval",
                explanation: "炭を動かさないと一部だけ過熱し、フレーバーが焦げる原因になります。定期的な調整が必要です。"
            },
            {
                category: "Ⅱ. 熱と炭の扱い",
                question: "吸い始めと30分後で、炭の役割がどう変わるか説明できる",
                type: "self-eval",
                explanation: "炭替え前後で熱量が大きく変化します。炭替え直後は熱が急上昇し、中層〜下層が活性化します。"
            },
            {
                category: "Ⅱ. 熱と炭の扱い",
                question: "炭替えを「いつ・なぜ」行うか説明できる",
                type: "self-eval",
                explanation: "炭が半分程度灰化したタイミングで、熱量維持のために行います。単なる熱源補充ではなく、味の変化も伴います。"
            },
            {
                category: "Ⅱ. 熱と炭の扱い",
                question: "熱が強すぎたと判断した具体的なサインを2つ言える",
                type: "self-eval",
                explanation: "えぐみが出る、煙が焦げ臭い、むせる、味が飛ぶなどのサインがあります。"
            },
            {
                category: "Ⅱ. 熱と炭の扱い",
                question: "熱が弱すぎたと判断した具体的なサインを2つ言える",
                type: "self-eval",
                explanation: "煙が薄い、味が出ない、吸い心地が軽すぎるなどのサインがあります。"
            },
            // Ⅲ．吸い方・人の影響（16〜21）
            {
                category: "Ⅲ. 吸い方・人の影響",
                question: "吸う強さ・間隔が、熱にどう影響するか説明できる",
                type: "self-eval",
                explanation: "強く吸うと空気が流れて熱が上がり、間隔が長いと熱が下がります。吸い方は熱管理の重要な変数です。"
            },
            {
                category: "Ⅲ. 吸い方・人の影響",
                question: "吸いすぎて崩れた経験を、原因込みで説明できる",
                type: "self-eval",
                explanation: "連続して強く吸うと熱が過剰になり、フレーバーが焦げたり、味が崩れる原因になります。"
            },
            {
                category: "Ⅲ. 吸い方・人の影響",
                question: "吸われなさすぎて崩れた経験を説明できる",
                type: "self-eval",
                explanation: "吸わない時間が長いと熱が逃げ、フレーバーが十分に活性化せず味が出なくなります。"
            },
            {
                category: "Ⅲ. 吸い方・人の影響",

                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];

            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            const total = currentQuestions.length;
            const percent = Math.round((score / total) * 100);

            // 総合スコア表示
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalTotal').textContent = `/ ${total}問`;

            // スコアサークル
            document.getElementById('scoreCircle').style.setProperty('--score-percent', percent + '%');

            // 総合グレード判定
            const totalGrade = getGrade(percent);
            document.getElementById('grade').textContent = totalGrade.grade;
            document.getElementById('gradeLabel').textContent = totalGrade.label;

            // シーシャスコア表示
            const shishaPercent = Math.round((shishaScore.correct / shishaScore.total) * 100);
            const shishaGradeInfo = getGrade(shishaPercent);
            document.getElementById('shishaScore').textContent = `${shishaScore.correct}/${shishaScore.total}`;
            document.getElementById('shishaPercent').textContent = `${shishaPercent}%`;
            const shishaGradeEl = document.getElementById('shishaGrade');
            shishaGradeEl.textContent = shishaGradeInfo.grade;
            shishaGradeEl.className = 'main-score-grade ' + shishaGradeInfo.class;

            // 経営スコア表示
            const businessPercent = Math.round((businessScore.correct / businessScore.total) * 100);
            const businessGradeInfo = getGrade(businessPercent);
            document.getElementById('businessScore').textContent = `${businessScore.correct}/${businessScore.total}`;
            document.getElementById('businessPercent').textContent = `${businessPercent}%`;
            const businessGradeEl = document.getElementById('businessGrade');
            businessGradeEl.textContent = businessGradeInfo.grade;
            businessGradeEl.className = 'main-score-grade ' + businessGradeInfo.class;

            // カテゴリ別スコア
            const categoryList = document.getElementById('categoryScoreList');
            categoryList.innerHTML = '';

            // シーシャカテゴリを先に表示
            const shishaCategories = Object.entries(categoryScores).filter(([cat]) => cat.startsWith('Ⅰ') || cat.startsWith('Ⅱ') || cat.startsWith('Ⅲ') || cat.startsWith('Ⅳ') || cat.startsWith('Ⅴ'));
            const businessCategories = Object.entries(categoryScores).filter(([cat]) => !cat.startsWith('Ⅰ') && !cat.startsWith('Ⅱ') && !cat.startsWith('Ⅲ') && !cat.startsWith('Ⅳ') && !cat.startsWith('Ⅴ'));

            // シーシャカテゴリ
            if (shishaCategories.length > 0) {
                const shishaHeader = document.createElement('div');
                shishaHeader.className = 'category-header';
                shishaHeader.innerHTML = '<strong>【シーシャ技術】</strong>';
                shishaHeader.style.marginTop = '10px';
                shishaHeader.style.marginBottom = '5px';
                shishaHeader.style.color = '#3498db';
                categoryList.appendChild(shishaHeader);

                for (const [category, data] of shishaCategories) {
                    const item = document.createElement('div');
                    item.className = 'category-score-item';
                    const catPercent = Math.round((data.correct / data.total) * 100);
                    item.innerHTML = `
                        <span class="name">${category}</span>
                        <span class="score">${data.correct}/${data.total} (${catPercent}%)</span>
                    `;
                    categoryList.appendChild(item);
                }
            }

            // 経営カテゴリ
            if (businessCategories.length > 0) {
                const businessHeader = document.createElement('div');
                businessHeader.className = 'category-header';
                businessHeader.innerHTML = '<strong>【経営知識】</strong>';
                businessHeader.style.marginTop = '15px';
                businessHeader.style.marginBottom = '5px';
                businessHeader.style.color = '#27ae60';
                categoryList.appendChild(businessHeader);

                for (const [category, data] of businessCategories) {
                    const item = document.createElement('div');
                    item.className = 'category-score-item';
                    const catPercent = Math.round((data.correct / data.total) * 100);
                    item.innerHTML = `
                        <span class="name">${category}</span>
                        <span class="score">${data.correct}/${data.total} (${catPercent}%)</span>
                    `;
                    categoryList.appendChild(item);
                }
            }
        }

        // 再スタート
        function restart() {
            document.getElementById('startScreen').style.display = 'block';
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
        }
    </script>
</body>
</html>
